<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h3 class="mb-0">Send Money</h3>
        </div>
        <div class="card-body p-4">
          <!-- Amount Input (Centered Large Field) -->
          <div class="text-center mb-4">
            <label class="form-label h5">Amount</label>
            <div class="input-group input-group-lg mb-3">
              <span class="input-group-text"><i class="bi bi-wallet2"></i></span>
              <input
                type="number"
                class="form-control text-center fs-2"
                placeholder="0.00"
                [(ngModel)]="amount"
              />
            </div>
          </div>

          <!-- Recipient Field -->
          <div class="mb-3">
            <label class="form-label">To</label>
            <div class="input-group">
              <span class="input-group-text">@</span>
              <input
                type="text"
                class="form-control"
                placeholder="Email or phone number"
                [(ngModel)]="recipient"
              />
            </div>
          </div>

          <!-- Note Field -->
          <div class="mb-4">
            <label class="form-label">Note (Optional)</label>
            <textarea class="form-control" rows="2" [(ngModel)]="reference"></textarea>
          </div>

          <!-- Action Buttons -->
          <div class="d-grid gap-2">
            <button class="btn btn-primary btn-lg" (click)="sendMoney()">
              Send Money
            </button>
            <button class="btn btn-outline-secondary btn-lg" (click)="cancel()">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
