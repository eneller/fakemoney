services:
  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: postgres  # Automatically connect to the "postgres" service
    ports:
      - "8080:8080"
    depends_on:
      - postgres  # Ensure PostgreSQL starts first
